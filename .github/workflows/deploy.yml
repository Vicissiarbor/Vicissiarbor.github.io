# 工作流名称
name: Deploy Hugo site to Pages

# 触发条件：推送到main分支时自动运行
on:
  push:
    branches: [main]

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发设置：防止同时部署
concurrency:
  group: "pages"
  cancel-in-progress: false

# 任务定义
jobs:
  # 部署任务
  deploy:
    runs-on: ubuntu-latest  # 使用最新版Ubuntu系统
    steps:
      # 第一步：检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # 包含主题子模块
          fetch-depth: 0

      # 第二步：安装Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true  # 使用extended版本

      # 第三步：构建网站
      - name: Build
        run: hugo --minify  # --minify压缩HTML

      # 第四步：部署到GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./public  # Hugo生成的静态文件目录
          external_repository: rang-jiao/rang-jiao.github.io  # 部署目标仓库
          publish_branch: main  # 部署到main分支