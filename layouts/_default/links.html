{{ define "main" }}
<article class="post-content">
  <h1>{{ .Title }}</h1>
  <div>{{ .Content }}</div>
  
  <div class="links-container">
    {{ range site.Data.links }}
    <div class="link-item">
      <img src="{{ .avatar }}" alt="{{ .name }}" loading="lazy">
      <div class="link-info">
        <h3><a href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a></h3>
        <p>{{ .bio }}</p>
      </div>
    </div>
    {{ end }}
  </div>
</article>

<style>
.links-container { display: grid; grid-gap: 20px; margin-top: 30px; }
.link-item { display: flex; align-items: center; padding: 15px; border: 1px solid var(--border); border-radius: 8px; }
.link-item img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; }
.link-info h3 { margin: 0; font-size: 1.2em; }
.link-info p { margin: 5px 0 0; color: var(--secondary); }
</style>
{{ end }}
