{{- end }}

<style>
  /* 覆盖Hugo生成的代码块样式 */
  pre code {
    background-color: #ffffff !important;  /* 强制白色背景 */
    color: #333333 !important;             /* 文字设为深灰（防白字） */
  }
  /* 若有行号，同步调整行号区域背景 */
  pre .lineno {
    background-color: #f5f5f5 !important;  /* 行号区域浅灰背景 */
    color: #666666 !important;
  }
</style>
