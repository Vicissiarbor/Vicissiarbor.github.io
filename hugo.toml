baseURL = 'https://rang-jiao.github.io'
languageCode = 'zh-cn'
title = '交讓所生'
theme = 'PaperMod'

[params]
  ShowReadingTime = true
  ShowShareButtons = true

# Markdown渲染配置（关键添加）
[markup]
  defaultMarkdownHandler = 'goldmark'
  
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 允许HTML渲染（如果需要在Markdown中插入HTML）
    
    [markup.goldmark.extensions]
      typographer = true
      table = true
      taskList = true
      strikethrough = true
      linkify = true

  [markup.highlight]
    style = 'github'  # 代码高亮主题
    lineNos = true    # 显示行号
    codeFences = true # 启用代码围栏